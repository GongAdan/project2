<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>로그인</title>
<link rel="stylesheet" th:href="@{/css/login.css}">
</head>

<body >

<div class="container">

    <h1>로그인</h1>

    <form th:action="@{/auth/login}" method="post">

        <input type="text"
               name="loginId"
               placeholder="아이디">

        <input type="password"
               name="password"
               placeholder="비밀번호">

        <button type="submit">
            로그인
        </button>

    </form>

    <a th:href="@{/account/register}">
        회원가입
    </a>

</div>

</body>
</html>
