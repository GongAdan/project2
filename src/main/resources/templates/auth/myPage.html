<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{common/head :: commonHead}"></th:block>
    <title>myPage</title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link rel="stylesheet" th:href="@{/css/myPage.css}">
</head>

<body>

    <th:block th:replace="~{common/header :: header}"></th:block>

    <main class="mypage-container">

        <section class="job-header">
            <div class="job-text">
                <h1>마이페이지</h1>
            </div>
        </section>

        <section class="user-info-section">
            <h3>내 정보 관리</h3>
            <form id="update-user-form" style="position: relative; padding-bottom: 20px;">
                <div class="user-info-row">
                    <label>아이디</label>
                    <span style="color: #1a1a1a; font-size: 15px;">
                        <strong th:text="${#authentication.name}">testUser123</strong>
                    </span>
                </div>
                <div class="user-info-row">
                    <label>닉네임</label>
                    <input type="text" id="userNickname" th:value="${nickname}" readonly>
                    <button type="button" class="text-edit-btn" onclick="openNicknameModal()">닉네임 변경</button>
                </div>

                <div class="user-info-row" style="margin-bottom: 20px;">
                    <label>비밀번호</label>
                    <input type="password" value="********" readonly>
                    <button type="button" class="text-edit-btn" onclick="openPasswordModal()">비밀번호 변경</button>
                </div>

                <div class="withdraw-inside-box">
                    <button type="button" class="btn-withdraw" onclick="openWithdrawModal()">
                        회원 탈퇴
                    </button>
                </div>
            </form>
        </section>

        <section class="board-section">
            <h3>내 활동 내역</h3>

            <div class="board-tab" style="margin-bottom: 25px !important; padding-bottom: 0 !important;">
                <button type="button" id="postsTabBtn" class="tab active" onclick="loadActivityTab('posts')">작성한
                    게시글</button>
                <button type="button" id="reviewsTabBtn" class="tab" onclick="loadActivityTab('reviews')">작성한
                    리뷰</button>
                <button type="button" id="favoritesTabBtn" class="tab"
                    onclick="loadActivityTab('favorites')">즐겨찾기</button>
            </div>

            <hr>
            <div id="activityContentContainer">
            </div>
        </section>
    </main>

    <div id="nicknameModal" class="mypage-modal" style="display: none;">
        <div class="modal-content">
            <h4>닉네임 변경</h4>
            <div class="modal-form-group">
                <label>기존 닉네임</label>
                <input type="text" th:value="${nickname}" readonly class="readonly-input">
            </div>
            <div class="modal-form-group">
                <label>변경 닉네임</label>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <input type="text" id="newNickname" placeholder="새로운 닉네임 입력" style="margin-bottom: 0;">
                    <button type="button" class="btn-check-duplicate" onclick="checkNicknameDuplicate()">중복확인</button>
                </div>
                <small id="nicknameCheckMsg" style="display: block; margin-top: 6px; font-weight: bold;"></small>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-cancel" onclick="closeNicknameModal()">취소</button>
                <button type="button" id="nicknameSubmitBtn" class="btn-submit" onclick="submitNicknameChange()"
                    disabled style="background: #ccc; cursor: not-allowed;">변경</button>
            </div>
        </div>
    </div>

    <div id="withdrawModal" class="mypage-modal" style="display: none;">
        <div class="modal-content" style="text-align: center;">
            <h4 style="color: #ff4d4f; margin-bottom: 15px;">회원 탈퇴</h4>

            <div style="margin: 20px 0; color: #4e5968; font-size: 14px; line-height: 1.6;">
                <strong>정말로 회원을 탈퇴하시겠습니까?</strong><br>
                탈퇴 시 회원님의 모든 활동 내역 및 데이터가<br>
                <span style="color: #ff4d4f; font-weight: bold;">완전히 삭제되며 절대 복구할 수 없습니다.</span>
            </div>

            <div class="modal-actions" style="margin-top: 25px;">
                <button type="button" class="btn-cancel" onclick="closeWithdrawModal()">취소</button>
                <button type="button" class="btn-submit" onclick="submitWithdraw()"
                    style="background: #ff4d4f !important; color: white !important;">탈퇴하기</button>
            </div>
        </div>
    </div>

    <div id="passwordModal" class="mypage-modal" style="display: none;">
        <div class="modal-content">
            <h4>비밀번호 변경</h4>
            <div class="modal-form-group">
                <label>기존 비밀번호</label>
                <input type="password" id="currentPassword" placeholder="현재 비밀번호를 입력하세요">
            </div>
            <div class="modal-form-group">
                <label>변경 비밀번호</label>
                <input type="password" id="newPassword" placeholder="새로운 비밀번호를 입력하세요" oninput="validatePasswordMatch()">
            </div>
            <div class="modal-form-group">
                <label>변경 비밀번호 확인</label>
                <input type="password" id="newPasswordConfirm" placeholder="새로운 비밀번호를 한번 더 입력하세요"
                    oninput="validatePasswordMatch()">
                <small id="passwordMatchMsg" style="display: block; margin-top: 4px; font-weight: bold;"></small>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-cancel" onclick="closePasswordModal()">취소</button>
                <button type="button" id="passwordSubmitBtn" class="btn-submit" onclick="submitPasswordChange()"
                    disabled style="background: #ccc; cursor: not-allowed;">변경</button>
            </div>
        </div>
    </div>

    <div id="reviewModal"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000;">
        <div
            style="background: white; padding: 25px; border-radius: 12px; width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.2);">
            <h3 id="reviewModalTitle" style="margin-top: 0; margin-bottom: 15px;">리뷰 수정하기</h3>

            <select id="reviewScore"
                style="width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box;">
                <option value="5">★★★★★ (5점)</option>
                <option value="4">★★★★☆ (4점)</option>
                <option value="3">★★★☆☆ (3점)</option>
                <option value="2">★★☆☆☆ (2점)</option>
                <option value="1">★☆☆☆☆ (1점)</option>
            </select>

            <textarea id="reviewContentInput" placeholder="리뷰 내용을 입력해주세요."
                style="width: 100%; height: 120px; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; resize: none; box-sizing: border-box;"></textarea>

            <div style="text-align: right;">
                <button type="button" onclick="closeReviewModal()"
                    style="background: #eee; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-right: 6px;">취소</button>
                <button type="button" id="reviewSubmitBtn" onclick="submitReview()"
                    style="background: #3b82f6; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer;">수정</button>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        // 페이지 로드가 완료되면 자동으로 첫 번째 'posts' 탭을 호출합니다.
        document.addEventListener("DOMContentLoaded", function () {
            console.log("마이페이지 DOM 로드 완료 - 기본 탭(posts) 호출");
            loadActivityTab('posts');

            // 🎯 로드 시점에 리뷰 모달 요소 추적 활성화
            reviewModal = document.getElementById("reviewModal");
        });

        // ========================================================
        // [추가] 0. 모달 창 열기 / 닫기 및 유효성 검사 제어 함수
        // ========================================================
        let isNicknameChecked = false; // 닉네임 중복확인 완료 여부 변수
        let editingReviewId = null;    // 리뷰 수정 ID 변수
        let reviewModal = null;        // 리뷰 모달 변수 초기화

        // 닉네임 모달 제어
        function openNicknameModal() {
            document.getElementById("nicknameModal").style.display = "flex";
            document.getElementById("newNickname").value = "";
            const msgEl = document.getElementById("nicknameCheckMsg");
            msgEl.innerText = "";
            resetNicknameSubmitBtn();
        }
        function closeNicknameModal() {
            document.getElementById("nicknameModal").style.display = "none";
        }

        // 비밀번호 모달 제어
        function openPasswordModal() {
            document.getElementById("passwordModal").style.display = "flex";
            document.getElementById("currentPassword").value = "";
            document.getElementById("newPassword").value = "";
            document.getElementById("newPasswordConfirm").value = "";
            document.getElementById("passwordMatchMsg").innerText = "";
            resetPasswordSubmitBtn();
        }
        function closePasswordModal() {
            document.getElementById("passwordModal").style.display = "none";
        }

        // 회원 탈퇴 모달 제어
        function openWithdrawModal() {
            document.getElementById("withdrawModal").style.display = "flex";
        }
        function closeWithdrawModal() {
            document.getElementById("withdrawModal").style.display = "none";
        }

        // 🎯 [수정] 모달 바깥 어두운 배경 클릭 시 리뷰 모달까지 안전하게 호환 닫히도록 통합 처리
        window.onclick = function (event) {
            const nickModal = document.getElementById("nicknameModal");
            const pwModal = document.getElementById("passwordModal");
            const withdrawModal = document.getElementById("withdrawModal");
            const revModal = document.getElementById("reviewModal");

            if (event.target === nickModal) closeNicknameModal();
            if (event.target === pwModal) closePasswordModal();
            if (event.target === withdrawModal) closeWithdrawModal();
            if (event.target === revModal) closeReviewModal();
        }

        // 닉네임 변경 버튼 상태 초기화
        function resetNicknameSubmitBtn() {
            isNicknameChecked = false;
            const btn = document.getElementById("nicknameSubmitBtn");
            btn.disabled = true;
            btn.style.background = "#ccc";
            btn.style.cursor = "not-allowed";
        }

        // 비밀번호 변경 버튼 상태 초기화
        function resetPasswordSubmitBtn() {
            const btn = document.getElementById("passwordSubmitBtn");
            btn.disabled = true;
            btn.style.background = "#ccc";
            btn.style.cursor = "not-allowed";
        }

        // 비밀번호 실시간 일치 조율 확인
        function validatePasswordMatch() {
            const newPw = document.getElementById("newPassword").value;
            const confirmPw = document.getElementById("newPasswordConfirm").value;
            const msgEl = document.getElementById("passwordMatchMsg");
            const btn = document.getElementById("passwordSubmitBtn");

            if (!newPw || !confirmPw) {
                msgEl.innerText = "";
                return;
            }

            if (newPw === confirmPw) {
                msgEl.innerText = "비밀번호가 일치합니다.";
                msgEl.style.color = "#2ecc71";
                btn.disabled = false;
                btn.style.background = "#4f83e2";
                btn.style.cursor = "pointer";
            } else {
                msgEl.innerText = "비밀번호가 일치하지 않습니다.";
                msgEl.style.color = "#ff4d4f";
                resetPasswordSubmitBtn();
            }
        }


        // ========================================================
        // [추가] 0-1. 모달 내부 비동기 백엔드 기능 처리 (Fetch)
        // ========================================================

        // 닉네임 중복 확인 함수
        window.checkNicknameDuplicate = function () {
            const currentNickname = /*[[${nickname}]]*/ '';
            const inputNickname = document.getElementById("newNickname").value.trim();
            const msgEl = document.getElementById("nicknameCheckMsg");
            const submitBtn = document.getElementById("nicknameSubmitBtn");

            if (!inputNickname) {
                alert("닉네임을 입력해 주세요.");
                return;
            }

            if (inputNickname === currentNickname) {
                msgEl.style.color = "#ff4d4f";
                msgEl.innerText = "❌ 현재 사용 중인 본인의 닉네임입니다.";
                isNicknameChecked = false;
                submitBtn.disabled = true;
                submitBtn.style.background = "#ccc";
                submitBtn.style.cursor = "not-allowed";
                return;
            }

            fetch(`/auth/myPage/check-nickname?nickname=${encodeURIComponent(inputNickname)}`)
                .then(res => res.json())
                .then(isExists => {
                    if (isExists === true) {
                        msgEl.style.color = "#ff4d4f";
                        msgEl.innerText = "❌ 이미 사용 중인 닉네임입니다.";
                        isNicknameChecked = false;
                        submitBtn.disabled = true;
                        submitBtn.style.background = "#ccc";
                        submitBtn.style.cursor = "not-allowed";
                    } else {
                        msgEl.style.color = "#2ec4b6";
                        msgEl.innerText = "🟢 사용 가능한 닉네임입니다.";
                        isNicknameChecked = true;
                        submitBtn.disabled = false;
                        submitBtn.style.background = "#3b90ff";
                        submitBtn.style.cursor = "pointer";
                    }
                })
                .catch(err => console.error("중복 확인 통신 에러:", err));
        };

        // 닉네임 최종 변경 요청 함수
        window.submitNicknameChange = function () {
            if (!isNicknameChecked) return;
            const newNickname = document.getElementById("newNickname").value.trim();

            fetch("/auth/myPage/update-nickname", {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ nickname: newNickname })
            })
                .then(res => {
                    if (!res.ok) {
                        return res.text().then(text => { throw new Error(text) });
                    }
                    return res.text();
                })
                .then(() => {
                    alert("닉네임이 성공적으로 변경되었습니다.");
                    location.reload();
                })
                .catch(err => {
                    console.error("변경 실패 에러 로그:", err);
                    alert("변경 요청 중 에러가 발생했습니다: " + err.message);
                });
        };

        // 비밀번호 실시간 일치 검증 함수
        window.validatePasswordMatch = function () {
            const newPw = document.getElementById("newPassword").value;
            const confirmPw = document.getElementById("newPasswordConfirm").value;
            const msgEl = document.getElementById("passwordMatchMsg");
            const submitBtn = document.getElementById("passwordSubmitBtn");

            if (!newPw || !confirmPw) {
                msgEl.innerText = "";
                return;
            }

            if (newPw === confirmPw) {
                msgEl.style.color = "#2ec4b6";
                msgEl.innerText = "🟢 변경할 비밀번호가 서로 일치합니다.";
                submitBtn.disabled = false;
                submitBtn.style.background = "#3b90ff";
                submitBtn.style.cursor = "pointer";
            } else {
                msgEl.style.color = "#ff4d4f";
                msgEl.innerText = "❌ 변경할 비밀번호가 서로 일치하지 않습니다.";
                submitBtn.disabled = true;
                submitBtn.style.background = "#ccc";
                submitBtn.style.cursor = "not-allowed";
            }
        };

        // 비밀번호 최종 변경 요청 함수
        window.submitPasswordChange = function () {
            const currentPassword = document.getElementById("currentPassword").value;
            const newPassword = document.getElementById("newPassword").value;

            if (!currentPassword.trim() || !newPassword.trim()) {
                alert("비밀번호를 모두 입력해 주세요.");
                return;
            }

            fetch("/auth/myPage/update-password", {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    currentPassword: currentPassword,
                    newPassword: newPassword
                })
            })
                .then(res => {
                    if (!res.ok) {
                        return res.text().then(text => { throw new Error(text) });
                    }
                    return res.text();
                })
                .then(() => {
                    alert("비밀번호가 성공적으로 변경되었습니다.");
                    closePasswordModal();
                    location.reload();
                })
                .catch(err => {
                    console.error("비밀번호 변경 실패:", err);
                    alert(err.message);
                });
        };

        // 회원 탈퇴 요청
        function submitWithdraw() {
            fetch('/auth/withdraw', { method: 'POST' })
                .then(res => {
                    if (res.ok) {
                        alert("회원 탈퇴가 완료되었습니다. 그동안 이용해 주셔서 감사합니다.");
                        location.href = "/";
                    } else {
                        alert("회원 탈퇴 처리 중 오류가 발생했습니다.");
                    }
                });
        }


        // ========================================================
        // 1. 통합 탭 제어 및 비동기 Fetch 함수
        // ========================================================
        function loadActivityTab(type) {
            console.log("선택된 탭 사양:", type);

            const tabs = document.querySelectorAll(".board-tab .tab, .board-section button.tab");
            tabs.forEach(function (btn) {
                btn.classList.remove("active");
            });

            const activeBtn = document.querySelector("button[onclick*='" + type + "']");
            if (activeBtn) {
                activeBtn.classList.add("active");
            }

            fetch('/auth/myPage/activity?type=' + type)
                .then(function (res) {
                    if (!res.ok) {
                        throw new Error("서버 응답 에러 (상태코드: " + res.status + ")");
                    }
                    return res.json();
                })
                .then(function (data) {
                    console.log(type + " 데이터 수신 성공:", data);

                    if (type === 'posts') {
                        renderMyPosts(data);
                    } else if (type === 'reviews') {
                        renderMyReviews(data);
                    } else if (type === 'favorites') {
                        renderMyFavorites(data);
                    }
                })
                .catch(function (err) {
                    console.error("비동기 탭 데이터 로딩 실패:", err);
                    const container = document.getElementById("activityContentContainer");
                    if (container) {
                        container.innerHTML = `<div class="board-empty" style="color: red;">데이터를 불러오는 중 오류가 발생했습니다.</div>`;
                    }
                });
        }

        // ========================================================
        // 2. 작성한 게시글 렌더링 함수
        // ========================================================
        function renderMyPosts(posts) {
            const container = document.getElementById("activityContentContainer");
            if (!container) return;

            if (!posts || posts.length === 0) {
                container.innerHTML = `<div class="board-empty">작성한 게시글이 없습니다.</div>`;
                return;
            }

            let html = `
            <table class="board-table">
                <thead>
                    <tr>
                        <th width="8%">번호</th>
                        <th>제목</th>
                        <th width="15%">등록일</th>
                        <th width="10%">조회</th>
                        <th width="10%">추천</th>
                    </tr>
                </thead>
                <tbody>
        `;

            posts.forEach(function (post, index) {
                const dateStr = post.createdAt ? post.createdAt.substring(0, 10) : '-';
                html += `
                <tr>
                    <td>${index + 1}</td>
                    <td class="title">
                        <a href="/board/detail?boardId=${post.boardId}">${post.title}</a>
                    </td>
                    <td>${dateStr}</td>
                    <td>${post.viewCount || 0}</td>
                    <td>${post.likeCount || 0}</td>
                </tr>
            `;
            });

            html += `</tbody></table>`;
            container.innerHTML = html;
        }


        // ========================================================
        // 3. 작성한 리뷰 렌더링 함수
        // ========================================================
        function renderMyReviews(reviews) {
            const container = document.getElementById("activityContentContainer");
            if (!container) return;

            if (!reviews || reviews.length === 0) {
                container.innerHTML = `<div class="review-empty" style="text-align:center; padding:40px 0; color:#9ca3af;">작성한 리뷰가 없습니다.</div>`;
                return;
            }

            let html = `<div class="review-carousel-track">`;

            reviews.forEach(function (review, index) {
                let stars = "";
                const score = review.score || 0;
                for (let i = 1; i <= 5; i++) {
                    stars += (i <= score) ? "★" : "☆";
                }

                const dateStr = review.createdAt ? review.createdAt.substring(0, 10) : '-';

                html += `
                <div class="review-game-card" id="review-target-${review.reviewId}" data-score="${score}" data-content="${review.content}">
                    
                    <div class="review-menu-container">
                        <button class="review-menu-btn" onclick="toggleReviewMenu(event, ${index})">⋮</button>
                        <div id="reviewMenu-${index}" class="review-dropdown-menu">
                            <a href="javascript:void(0);" onclick="handleReviewEdit(${review.reviewId}, true)">수정</a>
                            <a href="javascript:void(0);" class="delete-item" onclick="handleReviewDelete(${review.reviewId}, true)">삭제</a>
                        </div>
                    </div>

                    <div class="card-info">
                        <div class="review-card-header">
                            <div class="review-user">[${review.jobName || '직업'}]</div>
                        </div>
                        <div class="review-star">${stars}</div>
                        <div class="review-content">${review.content}</div>
                        <div class="review-date">${dateStr}</div>
                    </div>
                </div>
            `;
            });

            html += `</div>`;
            container.innerHTML = html;

            document.removeEventListener('click', closeAllReviewMenus);
            document.addEventListener('click', closeAllReviewMenus);
        }

        // 더보기 토글 스크립트
        function toggleReviewMenu(event, index) {
            event.stopPropagation();
            const allMenus = document.querySelectorAll('.review-dropdown-menu');
            allMenus.forEach(menu => {
                if (menu.id !== `reviewMenu-${index}`) menu.style.display = 'none';
            });

            const targetMenu = document.getElementById(`reviewMenu-${index}`);
            if (targetMenu) {
                targetMenu.style.display = (targetMenu.style.display === 'block') ? 'none' : 'block';
            }
        }

        function closeAllReviewMenus() {
            const allMenus = document.querySelectorAll('.review-dropdown-menu');
            allMenus.forEach(menu => menu.style.display = 'none');
        }

        // 🎯 [수정] 모달 열기 핸들러 안정화 처리
        function handleReviewEdit(reviewId, isOwner) {
            if (!isOwner) {
                alert("본인이 작성한 리뷰만 수정할 수 있습니다.");
                return;
            }

            editingReviewId = reviewId;

            const targetEl = document.getElementById(`review-target-${reviewId}`);
            if (!targetEl) {
                alert("리뷰 데이터를 찾지 못했습니다.");
                return;
            }

            const targetScore = targetEl.getAttribute("data-score");
            const targetContent = targetEl.getAttribute("data-content");

            document.getElementById("reviewScore").value = targetScore ? targetScore : "5";
            document.getElementById("reviewContentInput").value = targetContent ? targetContent : "";

            const modalTitle = document.getElementById("reviewModalTitle");
            const submitBtn = document.getElementById("reviewSubmitBtn");
            if (modalTitle) modalTitle.innerText = "리뷰 수정하기";
            if (submitBtn) submitBtn.innerText = "수정";

            // 만약 캐싱이 안 되었다면 실시간 탐색 시도 후 flex 처리
            if (!reviewModal) {
                reviewModal = document.getElementById("reviewModal");
            }
            if (reviewModal) {
                reviewModal.style.display = "flex";
            } else {
                alert("HTML 구조 내에 id='reviewModal' 모달창 엘리먼트가 보이지 않습니다. HTML 코드를 추가해 주세요.");
            }
        }

        function closeReviewModal() {
            if (!reviewModal) reviewModal = document.getElementById("reviewModal");
            if (reviewModal) reviewModal.style.display = "none";

            document.getElementById("reviewScore").value = "5";
            document.getElementById("reviewContentInput").value = "";
            editingReviewId = null;

            const modalTitle = document.getElementById("reviewModalTitle");
            const submitBtn = document.getElementById("reviewSubmitBtn");
            if (modalTitle) modalTitle.innerText = "리뷰 작성하기";
            if (submitBtn) submitBtn.innerText = "등록";
        }

        // 비동기 리뷰 데이터 수정 처리 모듈
        function submitReview() {
            const score = document.getElementById("reviewScore").value;
            const content = document.getElementById("reviewContentInput").value;

            if (!content.trim()) {
                alert("리뷰 내용을 입력해 주세요.");
                return;
            }

            const reviewData = {
                score: Number(score),
                content: content
            };

            if (typeof jobId !== 'undefined') {
                reviewData.jobId = Number(jobId);
            }

            const isEditMode = (editingReviewId !== null);
            const url = isEditMode ? `/api/review/${editingReviewId}` : "/api/review/register";
            const method = isEditMode ? "PUT" : "POST";

            fetch(url, {
                method: method,
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(reviewData)
            })
                .then(res => {
                    if (!res.ok) throw new Error(isEditMode ? "리뷰 수정에 실패했습니다." : "리뷰 등록에 실패했습니다.");
                    return res.text();
                })
                .then(() => {
                    closeReviewModal();
                    alert(isEditMode ? "성공적으로 수정되었습니다!" : "리뷰가 성공적으로 등록되었습니다!");
                    location.reload();
                })
                .catch(err => alert(err.message));
        }

        function handleReviewDelete(reviewId, isOwner) {
            if (!isOwner) {
                alert("본인이 작성한 리뷰만 삭제할 수 있습니다.");
                return;
            }
            if (!confirm("정말 이 리뷰를 삭제하시겠습니까?")) return;

            fetch(`/api/review/${reviewId}`, { method: "DELETE" })
                .then(res => {
                    if (!res.ok) throw new Error("리뷰 삭제에 실패했습니다.");
                    return res.text();
                })
                .then(() => {
                    alert("리뷰가 성공적으로 삭제되었습니다.");
                    location.reload();
                })
                .catch(err => alert(err.message));
        }

        // ========================================================
        // 4. 즐겨찾기 렌더링 함수
        // ========================================================
        function renderMyFavorites(favorites) {
            const container = document.getElementById("activityContentContainer");
            if (!container) return;

            if (!favorites || favorites.length === 0) {
                container.innerHTML = `<div class="board-empty">즐겨찾기한 게시글이 없습니다.</div>`;
                return;
            }

            let html = `
            <table class="board-table">
                <thead>
                    <tr>
                        <th width="15%">직업</th>
                        <th>글 제목</th>
                        <th width="15%">작성자</th>
                        <th width="15%">등록일</th>
                    </tr>
                </thead>
                <tbody>
        `;

            favorites.forEach(function (fav) {
                const dateStr = fav.createdAt ? fav.createdAt.substring(0, 10) : '-';
                html += `
                <tr>
                    <td><span style="background: #f3f4f6; padding: 2px 6px; border-radius: 4px; font-size: 13px;">${fav.jobName || '전체'}</span></td>
                    <td class="title">
                        <a href="/board/detail?boardId=${fav.boardId}">${fav.title}</a>
                    </td>
                    <td>${fav.nickname || '익명'}</td>
                    <td>${dateStr}</td>
                </tr>
            `;
            });

            html += `</tbody></table>`;
            container.innerHTML = html;
        }
    </script>

</body>
