<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>회원가입</title>
<link rel="stylesheet" th:href="@{/css/auth.css}">
</head>

<body>

<div class="container">

    <h1>회원가입</h1>

    <form th:action="@{/account/register}" method="post">

        <input type="text"
               name="loginId"
               placeholder="아이디">

        <input type="password"
               name="password"
               placeholder="비밀번호">

        <input type="text"
               name="nickname"
               placeholder="닉네임">

        <button type="submit">
            회원가입
        </button>

    </form>

    <a th:href="@{/auth/login}">
        로그인
    </a>

</div>

</body>
</html>
