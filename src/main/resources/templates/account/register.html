<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <th:block th:replace="~{common/head :: commonHead}"></th:block>
    <link rel="stylesheet" th:href="@{/css/register.css}">

</head>

<body>

<th:block th:replace="~{common/header :: header}"></th:block>

<main>

    <div class="register-container">

        <div class="register-title">
            회원가입
        </div>

        <form th:action="@{/account/register}" method="post">

            <div class="form-group">

                <label>아이디</label>

                <input type="text"
                       name="username"
                       placeholder="아이디를 입력하세요">

            </div>

            <div class="form-group">

                <label>비밀번호</label>

                <input type="password"
                       name="password"
                       placeholder="비밀번호를 입력하세요">

            </div>

            <div class="form-group">

                <label>닉네임</label>

                <input type="text"
                       name="nickname"
                       placeholder="닉네임을 입력하세요">

            </div>

            <button type="submit"
                    class="register-btn">
                회원가입
            </button>

        </form>

        <div class="login-link">

            이미 계정이 있으신가요?

            <a th:href="@{/auth/login}">
                로그인
            </a>

        </div>

    </div>

</main>

</body>

</html>
