<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{common/head :: commonHead}" />
    <link rel="stylesheet" th:href="@{/css/registerBoard.css}">
    <title>공략 수정</title>
</head>

<body>

    <th:block th:replace="~{common/header :: header}" />

    <main>

        <div class="board-container">

            <h1>공략 수정</h1>

            <form th:action="@{/board/edit}" method="post" enctype="multipart/form-data">

                <!-- 게시글 번호 -->
                <input type="hidden" name="boardId" th:value="${board.boardId}">

                <!-- 직업번호 -->
                <input type="hidden" name="jobId" th:value="${board.jobId}">

                <!-- 게시판 타입 -->
                <input type="hidden" name="boardType" th:value="${board.boardType}">

                <div class="form-group">

                    <label>제목</label>

                    <input type="text" name="title" th:value="${board.title}" placeholder="제목을 입력하세요">

                </div>

                <div class="form-group">

                    <label>내용</label>

                    <textarea name="content" rows="15" placeholder="공략 내용을 작성하세요."
                        th:text="${board.content}"></textarea>

                </div>

                <div class="form-group">
                    <label>첨부파일</label>
                    <input type="file" id="fileInput" name="files" multiple style="display: none;">

                    <div id="existingFileList">
                        <div th:each="img : ${board.attachList}" class="file-item" th:attr="data-id=${img.attachId}">
                            <span th:text="${img.fileRealName}"></span>
                            <button type="button" class="delete-existing">삭제</button>
                        </div>
                    </div>

                    <!-- 첨부파일 추가 버튼과 목록 컨테이너를 첨부파일 폼 그룹 내부 혹은 하단에 자연스럽게 배치 -->
                    <button type="button" id="btnFileSelect" class="btn btn-secondary" style="margin-top: 10px;">
                        첨부파일 추가
                    </button>

                    <div id="fileListContainer" style="margin-top: 10px;"></div>
                </div>

                <!-- 삭제된 이미지 ID -->
                <input type="hidden" name="deletedImageIds" id="deletedImageIds">

                <!-- 버튼 그룹 ("수정 완료", "취소") -->
                <div class="button-group">
                    <button type="submit" class="save-btn">수정 완료</button>
                    <a th:href="@{/board/detail(boardId=${board.boardId})}" class="cancel-btn">취소</a>
                </div>

            </form>

        </div>

    </main>

    <script>
        const fileInput = document.getElementById("fileInput");
        const btnFileSelect = document.getElementById("btnFileSelect");
        const fileListContainer = document.getElementById("fileListContainer");

        if (!fileListContainer) {
            console.warn("fileListContainer 없음");
        }

        let fileStore = new DataTransfer();

        // 버튼 클릭 → 파일 선택창 열기
        btnFileSelect.addEventListener("click", () => {
            fileInput.click();
        });

        // 파일 선택 시
        fileInput.addEventListener("change", (e) => {
            const files = e.target.files;

            for (let file of files) {
                fileStore.items.add(file);
            }

            fileInput.files = fileStore.files;

            renderFileList();
        });

        // 파일 목록 렌더링
        function renderFileList() {
            fileListContainer.innerHTML = "";

            Array.from(fileStore.files).forEach((file, index) => {

                const div = document.createElement("div");
                div.className = "file-item";

                div.innerHTML = `
            <span>${file.name}</span>
            <button type="button" onclick="removeFile(${index})">삭제</button>
        `;

                fileListContainer.appendChild(div);
            });
        }

        // 파일 삭제
        function removeFile(index) {
            let newStore = new DataTransfer();

            Array.from(fileStore.files)
                .forEach((file, i) => {
                    if (i !== index) newStore.items.add(file);
                });

            fileStore = newStore;
            fileInput.files = fileStore.files;

            renderFileList();
        }

        let deletedImageIds = [];

        document.getElementById("existingFileList")
            .addEventListener("click", function (e) {

                if (!e.target.classList.contains("delete-existing")) return;

                const item = e.target.closest(".file-item");
                const id = item.dataset.id;

                deletedImageIds.push(id);

                document.getElementById("deletedImageIds").value =
                    deletedImageIds.join(",");

                item.remove();
            });

    </script>


</body>

</html>
