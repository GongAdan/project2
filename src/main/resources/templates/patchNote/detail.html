<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>게시글 목록</title>
</head>
<body>
<h2 th:text="${patchNote.title}"></h2>

<p th:text="${patchNote.nickname}"></p>

<p th:text="${#temporals.format(patchNote.createdAt,'yyyy-MM-dd HH:mm')}"></p>

<hr>

<div th:utext="${patchNote.content}"></div>

<hr>

<a href="/patch">목록</a>

<a sec:authorize="hasRole('ADMIN')"
th:href="@{/patch/{id}/edit(id=${patchNote.patchNoteId})}">
수정
</a>
</body>

</html>
