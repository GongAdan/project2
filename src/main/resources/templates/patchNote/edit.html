<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>게시글 목록</title>
</head>
<body>
<form th:action="@{/patch/{id}/edit(id=${patchNote.patchNoteId})}"
      method="post">

<input type="text"
       name="title"
       th:value="${patchNote.title}">

<textarea name="content"
          rows="20"
          th:text="${patchNote.content}">
</textarea>

<button type="submit">
저장
</button>

</form>
</body>

</html>
