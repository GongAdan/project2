<header>
    <div class="header-container">

        <a class="logo" th:href="@{/}">
            CrystallineConflict
        </a>

        <div class="header-section">
            <div sec:authorize="isAnonymous()" class="auth-links">
                <a th:href="@{/account/register}">회원가입</a>
                <a th:href="@{/auth/login}">로그인</a>
            </div>

            <div sec:authorize="isAuthenticated()" class="user-menu">
                <span class="user-nickname">
                    <strong th:text="${#authentication.name}">test</strong>님
                </span>

                <a th:href="@{/auth/myPage}" class="header-btn mypage-btn">마이페이지</a>

                <form th:action="@{/auth/logout}" method="post" class="logout-form">
                    <button type="submit" class="header-btn logout-btn">로그아웃</button>
                </form>
            </div>
        </div>

    </div>
</header>
